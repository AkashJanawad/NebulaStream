<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaStream | The Future of Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="cinematic.css">
</head>
<body>
    <nav>
        <div class="logo">NebulaStream</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard.html">Discover</a></li>
            <li><a href="/login.html">Login</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>Limitless Content. <br><span>One Nebula.</span></h1>
            <p>Experience the next generation of cinematic streaming with Nebula AI and 3D immersion.</p>
            
            <div class="auth-box">
                <form action="/signup" method="POST">
                    <div class="input-group">
                        <input type="email" name="email" id="email" placeholder=" " required>
                        <label for="email">Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" id="password" placeholder=" " required>
                        <label for="password">Create Password</label>
                    </div>
                    <button type="submit" class="liquid-btn">Join the Nebula</button>
                </form>
                <p class="mt-20">Already in the Nebula? <a href="login.html" style="color: var(--accent);">Login</a></p>
            </div>
        </section>
    </main>

    <script src="chatbot.js"></script>
    <script src="cinematic.js"></script>
</body>
</html>
