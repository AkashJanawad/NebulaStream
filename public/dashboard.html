<!DOCTYPE html>
<html>
<head>
    <title>NebulaStream | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="cinematic.css">
</head>
<body>
    <nav>
        <div class="logo">NebulaStream</div>
        <div style="flex: 1; margin: 0 40px; position: relative;">
            <input type="text" id="searchInput" placeholder="Search movies..." style="width: 100%; padding: 12px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; transition: all 0.3s; backdrop-filter: blur(10px);">
        </div>
        <div>
            <button id="uploadBtn" class="liquid-btn">+ Upload Video</button>
            <a href="/logout" style="margin-left:20px; color:white; text-decoration:none; font-weight:600; opacity: 0.7; transition: 0.3s;">Logout</a>
        </div>
    </nav>

    <main style="padding-top: 120px;">
        <div style="padding: 0 5%;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Your <span>Nebula</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 40px;">Explore your curated collection of cinematic experiences.</p>
            
            <div id="videoGrid" class="video-grid">
                <!-- Videos will be rendered here as a 3D Carousel or Grid -->
            </div>
        </div>
    </main>

    <div id="adminModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(2,2,5,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(20px);">
        <div class="auth-box" style="text-align:center; border-color: #ff4b2b;">
            <h2 style="color:#ff4b2b; margin-bottom: 15px;">Access Restricted</h2>
            <p style="color:white; margin-bottom: 30px;">Only the <b>Nebula Admin</b> can upload content to the main stream.</p>
            <button onclick="document.getElementById('adminModal').style.display='none'" class="liquid-btn" style="background: white; color: black;">Back to Library</button>
        </div>
    </div>

    <script>
        let userStatus = { isAdmin: false };

        fetch('/api/check-auth')
            .then(res => res.json())
            .then(data => { userStatus = data; });

        document.getElementById('uploadBtn').onclick = function() {
            if (userStatus.isAdmin) window.location.href = 'upload.html';
            else document.getElementById('adminModal').style.display = 'flex';
        };

        let allVideos = [];

        fetch('/api/videos')
            .then(res => res.json())
            .then(videos => {
                allVideos = videos;
                renderVideos(videos);
            });

        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(v => `
                <div class="video-card">
                    <a href="/watch/${v._id}" style="text-decoration:none;">
                        <img src="${v.thumbnailPath}">
                        <div style="padding:20px;">
                            <h3 style="margin:0; color:white; font-size: 1.1rem; font-weight: 600;">${v.title}</h3>
                            <p style="color:var(--accent); font-size: 0.85rem; margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Watch Experience</p>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').oninput = function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(term));
            renderVideos(filtered);
        };
    </script>
    <script src="chatbot.js"></script>
    <script src="cinematic.js"></script>
</body>
</html>
