<!DOCTYPE html>
<html>
<head>
    <title>NebulaStream | Upload</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="cinematic.css">
</head>
<body>
    <nav>
        <div class="logo">NebulaStream</div>
        <ul>
            <li><a href="/dashboard.html">Back to Library</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="auth-box" style="max-width: 600px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Upload <span>Content</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Add new cinematic artifacts to the NebulaStream library.</p>
            
            <form action="/upload" method="POST" enctype="multipart/form-data" style="text-align: left;">
                <div class="input-group">
                    <input type="text" name="title" id="title" placeholder=" " required>
                    <label for="title">Video Title</label>
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label style="color: var(--text-dim); display: block; margin-bottom: 10px; font-size: 0.9rem;">Video File (.mp4)</label>
                    <div style="position: relative; overflow: hidden; display: inline-block; width: 100%;">
                        <input type="file" name="video" accept="video/mp4" required style="width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px dashed var(--glass-border); border-radius: 12px; color: white;">
                    </div>
                </div>

                <div style="margin-bottom: 35px;">
                    <label style="color: var(--text-dim); display: block; margin-bottom: 10px; font-size: 0.9rem;">Thumbnail (.jpg / .png)</label>
                    <div style="position: relative; overflow: hidden; display: inline-block; width: 100%;">
                        <input type="file" name="thumbnail" accept="image/*" required style="width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px dashed var(--glass-border); border-radius: 12px; color: white;">
                    </div>
                </div>

                <button type="submit" class="liquid-btn">Publish to the Nebula</button>
            </form>
        </div>
    </main>

    <script src="chatbot.js"></script>
    <script src="cinematic.js"></script>
</body>
</html>
